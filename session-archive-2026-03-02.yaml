# ── Key decisions ────────────────────────────────────────────────────────────

decisions:
  crop_timing: >
    Crop happens after file selection, before trace.
    User sees canvas modal with the raw sketch, selects region,
    then cropped image goes to auto-trace pipeline.

  svg_fill_strategy: >
    Default fill "#81C784" (green) baked into each component as fallback.
    Components accept props.color for runtime override via YogaAssetRenderer.
    This solves the dark-theme visibility issue without requiring CSS hacks.

  tracer_tuning: >
    Threshold 22, blur 6, edge margin 1 calibrated for hand-drawn yoga
    sketches on white paper. Higher threshold captures more ink detail,
    moderate blur smooths JPEG artifacts, minimal edge margin preserves
    content near paper edges.

