# ── What we built this session ────────────────────────────────────────────────
built:
  visualize_keypoints.py:
    location: svg-pipeline/files-detector/visualize_keypoints.py
    status: live, yoga-tuned
    v1_problems:
      - 11 face landmarks clustered at head — noisy, visually dominant
      - All joints same color — couldn't read left/right body split
    v2_changes:
      - Face landmarks suppressed — replaced with single head circle
        (radius estimated from shoulder width)
      - Left side = blue, Right side = orange
      - Key yoga joints labelled: shoulders, elbows, wrists, hips, knees, ankles
      - Secondary joints (hands, feet) small unlabelled dots
      - Info bar: LEFT/RIGHT legend + pose number, frame, timestamp, stability, kp count
    usage:
      single: "python3 visualize_keypoints.py extracted_poses/pose_01_keypoints.json"
      batch:  "python3 visualize_keypoints.py extracted_poses/"

  overlays_generated:
    location: svg-pipeline/files-detector/extracted_poses/
    files: pose_01_overlay.jpg → pose_55_overlay.jpg (55 total)
    format: yoga-tuned v2

# ── Key decisions made ────────────────────────────────────────────────────────
decisions:
  pose_naming: off
    note: >
      Keypoints are geometry, not labels. Do not attempt to identify or name poses
      from keypoint data or images. That's Jarvis's domain.

  sketch_first: confirmed
    note: >
      Direction is sketch-first. Hand drawings skip stages 1 & 2 entirely.
      Goes straight to: threshold (Otsu) → potrace → SVG.
      Video pipeline remains available for bulk/reference but sketch is primary.

  keypoints_role:
    note: >
      Keypoints are spatial ground truth — joint angles, proportions, left/right accuracy.
      They do NOT drive the artistic character of the SVG.
      Recommended approach: potrace the sketch first (preserves Jarvis's hand),
      then pass SVG + keypoints JSON to Claude for proportion/position correction.
      This is the approach proven with the wheel pose in the archive.

  svg_approach: sketch + Claude cleanup (proven)
    options_considered:
      1: Sketch-only potrace (artistic, no correction)
      2: Sketch + Claude cleanup using keypoints (RECOMMENDED — proven with wheel)
      3: Keypoints-first programmatic skeleton + sketch style overlay

